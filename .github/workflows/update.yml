name: Update market data

on:
  workflow_dispatch:
    inputs:
      market: { description: "市场 cn / us / both", default: "both" }
      mode: { description: "模式 preview / summary", default: "summary" }
  schedule:
    - cron: "30 0 * * 1-5"       # A股盘前前瞻
    - cron: "*/5 1-7 * * 1-5"    # A股盘中每5分钟
    - cron: "30 12 * * 1-5"      # 美股盘前前瞻
    - cron: "*/5 13-21 * * 1-5"  # 美股盘中每5分钟

permissions:
  contents: write
concurrency:
  group: market-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Decide market & mode
        id: cfg
        run: |
          case "${{ github.event.schedule }}" in
            "30 0 * * 1-5")  MARKET=cn; MODE=preview ;;
            "30 12 * * 1-5") MARKET=us; MODE=preview ;;
            *)               MARKET=both; MODE=summary ;;
          esac
          MARKET="${{ github.event.inputs.market }}"; MARKET="${MARKET:-$MARKET}"
          M2="${{ github.event.inputs.market }}"; if [ -n "$M2" ]; then MARKET="$M2"; fi
          MODE2="${{ github.event.inputs.mode }}"; if [ -n "$MODE2" ]; then MODE="$MODE2"; fi
          echo "market=${MARKET:-both}" >> "$GITHUB_OUTPUT"
          echo "mode=${MODE:-summary}" >> "$GITHUB_OUTPUT"
      - name: Fetch & build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-sonnet-4-6
        run: python fetch.py --market ${{ steps.cfg.outputs.market }} --mode ${{ steps.cfg.outputs.mode }}
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git commit -m "data $(date -u +%FT%TZ)" || echo "no changes"
          git push
