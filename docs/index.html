<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 算力链 · 行情终端</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  :root{
    --bg:#0a0e16;--bg2:#0e131d;--panel:#121826;--panel2:#161d2c;
    --bd:#1f2838;--bd2:#2a3447;--tx:#e6ebf5;--mut:#8a94a8;--dim:#5e6678;
    --up:#ff4d57;--down:#1fc78b;--flat:#6b7384;--accent:#3b82f6;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:radial-gradient(1200px 600px at 70% -10%,#10192b 0%,var(--bg) 60%);
    color:var(--tx);font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased;}
  header{padding:16px 20px 8px;}
  h1{font-size:18px;margin:0;font-weight:600;display:flex;align-items:center;gap:9px;}
  h1::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--down);box-shadow:0 0 10px var(--down);animation:pulse 2.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .meta{font-size:11.5px;color:var(--mut);margin-top:4px;font-family:var(--mono);}
  .tabs{display:flex;gap:4px;padding:10px 16px 0;flex-wrap:wrap;border-bottom:1px solid var(--bd);}
  .tab{font-size:13px;padding:8px 16px;border:none;background:none;cursor:pointer;color:var(--mut);border-bottom:2px solid transparent;border-radius:6px 6px 0 0;}
  .tab:hover{color:var(--tx);background:var(--panel);}
  .tab.on{color:#fff;border-bottom-color:var(--accent);font-weight:600;}
  main{padding:16px;max-width:1240px;margin:0 auto;}
  .sec{display:none;} .sec.on{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin:6px 0 10px;font-weight:600;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:11px;margin-bottom:18px;}
  .icard{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--bd);border-radius:12px;padding:13px 15px;position:relative;overflow:hidden;}
  .icard::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;}
  .icard.u::after{background:var(--up);box-shadow:0 0 12px var(--up);}
  .icard.d::after{background:var(--down);box-shadow:0 0 12px var(--down);}
  .icard .nm{font-size:12px;color:var(--mut);}
  .icard .pt{font-size:21px;font-weight:600;margin-top:4px;font-family:var(--mono);}
  .icard .ch{font-size:13px;font-weight:700;margin-top:3px;font-family:var(--mono);}
  .bre b.u{color:var(--up);} .bre b.d{color:var(--down);}
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
  .panel{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--bd);border-radius:14px;padding:13px 15px;}
  .panel.full{grid-column:1/-1;}
  .panel .pt{font-size:13.5px;font-weight:600;margin:0 0 4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .panel .ps{font-size:11px;color:var(--dim);}
  .chart{width:100%;}
  select{font-size:12px;padding:4px 8px;border:1px solid var(--bd2);border-radius:7px;background:var(--panel);color:var(--tx);font-family:inherit;}
  @media(max-width:780px){.charts{grid-template-columns:1fr;}}
  /* 控件/表/赛道/简报 */
  .controls{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
  .controls button,input{font-size:12.5px;padding:6px 11px;border:1px solid var(--bd2);border-radius:8px;background:var(--panel);color:var(--tx);cursor:pointer;font-family:inherit;}
  .controls button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  input::placeholder{color:var(--dim);}
  table{width:100%;border-collapse:collapse;font-size:12.5px;background:var(--panel);border:1px solid var(--bd);border-radius:10px;overflow:hidden;}
  th,td{padding:8px 10px;border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap;}
  th{background:var(--bg2);color:var(--mut);font-weight:600;font-size:11px;letter-spacing:.5px;text-transform:uppercase;}
  tr:hover td{background:var(--panel2);}
  td.pct{font-weight:700;text-align:right;font-family:var(--mono);}
  td.num{text-align:right;color:var(--mut);font-family:var(--mono);}
  .rk{color:var(--dim);font-family:var(--mono);}
  .mtag{font-size:10px;padding:1px 6px;border-radius:5px;font-weight:600;}
  .m-US{background:#10243f;color:#6fb0ff;} .m-CN{background:#3a1822;color:#ff8aa0;}
  .k-etf{font-size:9.5px;color:#9bd;background:#16243a;padding:1px 5px;border-radius:4px;margin-left:5px;}
  .track{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--bd);border-radius:14px;padding:14px 16px;margin-bottom:14px;}
  .thead{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px;}
  .thead .tn{font-size:15px;font-weight:600;} .thead .ly{font-size:11px;color:var(--dim);}
  .stars{color:#f5a623;font-size:12px;letter-spacing:1px;} .stars .o{color:#39404f;}
  .avgbadge{margin-left:auto;font-family:var(--mono);font-size:12.5px;font-weight:700;padding:4px 11px;border-radius:8px;border:1px solid var(--bd2);}
  .breadth{font-size:11px;color:var(--mut);font-family:var(--mono);margin-bottom:8px;}
  .subl{font-size:10.5px;letter-spacing:1px;color:var(--dim);margin:8px 0 6px;font-weight:600;}
  .heat{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:6px;}
  .tile{border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:8px 9px;display:flex;flex-direction:column;gap:3px;min-height:50px;justify-content:center;transition:transform .1s;}
  .tile:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.22);}
  .tile .tn{font-size:12px;font-weight:600;color:#fff;line-height:1.2;}
  .tile .tp{font-size:12.5px;font-weight:700;font-family:var(--mono);}
  .tile.flat{background:var(--panel);} .tile.flat .tn{color:var(--mut);} .tile.flat .tp{color:var(--dim);}
  .brief{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--bd);border-radius:14px;padding:18px 20px;margin-bottom:14px;}
  .brief h3{margin:0 0 3px;font-size:16px;}
  .brief .st{font-size:11px;color:var(--mut);margin-bottom:12px;font-family:var(--mono);}
  .brief .intro{font-size:13.5px;line-height:1.75;color:#cfd6e4;margin:0 0 14px;padding:12px 14px;background:rgba(59,130,246,.06);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;}
  .brief h4{font-size:13px;margin:14px 0 6px;color:#fff;display:flex;align-items:center;gap:7px;}
  .brief h4::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);}
  .brief ul{margin:0;padding-left:0;list-style:none;}
  .brief li{margin:6px 0;font-size:13px;line-height:1.6;padding-left:16px;position:relative;color:#dde3ee;}
  .brief li::before{content:"▸";position:absolute;left:0;color:var(--accent);}
  .empty{color:var(--mut);font-size:13px;padding:30px;text-align:center;}
  .foot{color:var(--dim);font-size:11px;margin-top:24px;line-height:1.6;font-family:var(--mono);}
</style>
</head>
<body>
<header>
  <h1>AI 算力链 · 行情终端</h1>
  <div class="meta" id="meta">LOADING…</div>
</header>
<nav class="tabs" id="tabs">
  <button class="tab on" data-s="overview">大盘总览</button>
  <button class="tab" data-s="rank">涨跌幅排名</button>
  <button class="tab" data-s="tracks">全部赛道</button>
  <button class="tab" data-s="brief">盘前/盘后简报</button>
</nav>
<main>
  <section class="sec on" id="overview"></section>
  <section class="sec" id="rank"></section>
  <section class="sec" id="tracks"></section>
  <section class="sec" id="brief"></section>
  <div class="foot" id="foot"></div>
</main>

<script>
const UP="#ff4d57",DOWN="#1fc78b",FLAT="#6b7384",ACC="#3b82f6",AX="#5e6678",GRID="#1f2838",TXT="#8a94a8";
function dir(p){return p>0?"up":(p<0?"down":"flat");}
function col(p){return p>0?UP:(p<0?DOWN:FLAT);}
function fmtp(p){return (p>0?"+":"")+p.toFixed(2)+"%";}
let DATA=null,charts=[];
const baseGrid={backgroundColor:"transparent",textStyle:{color:TXT,fontFamily:"inherit"}};

async function load(){
  try{
    const r=await fetch("./data.json?t="+Date.now());
    if(!r.ok) throw 0;
    DATA=await r.json();
    if(!DATA.meta||!DATA.meta.updated_at) throw 0;
  }catch(e){
    document.getElementById("meta").textContent="尚无数据 —— 等定时任务或手动 Run workflow 跑完即出现。";
    return;
  }
  render();
}
function render(){
  const m=DATA.meta||{},f=s=>s?new Date(s).toLocaleString("zh-CN"):"—";
  document.getElementById("meta").innerHTML="A股 "+f(m.updated_cn)+" ｜ 美股 "+f(m.updated_us)+" ｜ 日级/延迟数据 · 红涨绿跌 · 非投资建议";
  renderOverview();renderRank();renderTracks();renderBrief();
  document.getElementById("foot").textContent="标的(有数据) "+Object.keys(DATA.tickers||{}).length+" ｜ 数据源 yfinance ｜ 自动更新于 GitHub Actions ｜ 仅供研究,非投资建议。";
}

/* ============ 大盘总览 ============ */
function icard(q){
  if(!q) return "<div class='icard'><div class='nm'>—</div><div class='pt'>—</div></div>";
  const d=q.pct!=null?dir(q.pct):"flat";
  return "<div class='icard "+(d==='up'?'u':d==='down'?'d':'')+"'><div class='nm'>"+q.name+"</div><div class='pt'>"+(q.price!=null?q.price.toLocaleString():"—")+"</div><div class='ch' style='color:"+col(q.pct)+"'>"+(q.pct!=null?fmtp(q.pct):"—")+"</div></div>";
}
function breadthOf(mkt){const a=Object.values(DATA.tickers||{}).filter(x=>x.market===mkt&&x.kind==="stock"&&x.pct!=null);
  return {up:a.filter(x=>x.pct>0).length,dn:a.filter(x=>x.pct<0).length,fl:a.filter(x=>x.pct===0).length,n:a.length};}
function trackAvgList(){
  const uni=DATA.universe||[],tk=DATA.tickers||{},m={},seen=[];
  uni.forEach(r=>{if(r.kind!=="stock")return; if(!seen.includes(r.track))seen.push(r.track);
    const q=tk[r.yf]; if(q&&q.pct!=null){(m[r.track]=m[r.track]||[]).push(q.pct);}});
  return seen.filter(t=>m[t]).map(t=>({t,a:m[t].reduce((x,y)=>x+y,0)/m[t].length})).sort((x,y)=>x.a-y.a);
}
function CNN(){return ["000001.SS","399001.SZ","399006.SZ","000300.SS"];}
function USN(){return ["^GSPC","^IXIC","^SOX","^DJI"];}

function renderOverview(){
  const idx=DATA.indices||{};
  const idxOpts=[...CNN(),...USN()].filter(s=>(DATA.history||{})[s]);
  const sel=idxOpts.length?idxOpts.includes("^SOX")?"^SOX":idxOpts[0]:null;
  let h="<div class='lbl'>A股大盘</div><div class='grid'>"+CNN().map(s=>icard(idx[s])).join("")+"</div>";
  h+="<div class='lbl'>美股大盘</div><div class='grid'>"+USN().map(s=>icard(idx[s])).join("")+"</div>";
  const cn=breadthOf("CN"),us=breadthOf("US");
  h+="<div class='lbl'>观察池市场宽度</div><div class='grid bre'>"+
    "<div class='icard'><div class='nm'>A股</div><div class='ch'><b class='u'>"+cn.up+" ↑</b> / <b class='d'>"+cn.dn+" ↓</b> <span style='color:var(--dim)'>· 共 "+cn.n+"</span></div></div>"+
    "<div class='icard'><div class='nm'>美股</div><div class='ch'><b class='u'>"+us.up+" ↑</b> / <b class='d'>"+us.dn+" ↓</b> <span style='color:var(--dim)'>· 共 "+us.n+"</span></div></div></div>";
  // 图表面板
  h+="<div class='lbl'>图表分析</div><div class='charts'>";
  h+="<div class='panel full'><div class='pt'>K 线 + 成交量 <select id='ksel'>"+
     idxOpts.map(s=>"<option value='"+s+"' "+(s===sel?"selected":"")+">"+(idx[s]?idx[s].name:s)+"</option>").join("")+
     "</select><span class='ps'>近 60 个交易日</span></div><div id='c_k' class='chart' style='height:340px'></div></div>";
  h+="<div class='panel full'><div class='pt'>指数走势(归一化=100)<span class='ps'>近期对齐,看相对强弱</span></div><div id='c_line' class='chart' style='height:300px'></div></div>";
  h+="<div class='panel'><div class='pt'>赛道平均涨跌幅</div><div id='c_track' class='chart' style='height:360px'></div></div>";
  h+="<div class='panel'><div class='pt'>领涨 / 领跌 TOP15</div><div id='c_mov' class='chart' style='height:360px'></div></div>";
  h+="<div class='panel'><div class='pt'>涨跌分布</div><div id='c_pie' class='chart' style='height:280px'></div></div>";
  h+="<div class='panel'><div class='pt'>市场情绪(上涨占比)</div><div id='c_gauge' class='chart' style='height:280px'></div></div>";
  h+="<div class='panel full'><div class='pt'>全市场热力树图 <span class='ps'>块大小=涨跌幅绝对值 · 颜色=涨跌</span></div><div id='c_tree' class='chart' style='height:460px'></div></div>";
  h+="</div>";
  document.getElementById("overview").innerHTML=h;
  charts.forEach(c=>{try{c.dispose();}catch(e){}});charts=[];
  drawK(sel);drawLine();drawTrack();drawMovers();drawPie(cn,us);drawGauge(cn,us);drawTree();
  document.getElementById("ksel").onchange=e=>drawK(e.target.value);
}
function mk(id){const el=document.getElementById(id);if(!el)return null;const c=echarts.init(el,null,{renderer:"canvas"});charts.push(c);return c;}

function drawK(sym){
  const h=(DATA.history||{})[sym];const c=mk("c_k");if(!c||!h)return;
  const kd=h.c.map((_,i)=>[h.o[i],h.c[i],h.l[i],h.h[i]]);
  c.setOption({...baseGrid,
    tooltip:{trigger:"axis",axisPointer:{type:"cross"}},
    axisPointer:{link:[{xAxisIndex:"all"}]},
    grid:[{left:48,right:16,top:14,height:"62%"},{left:48,right:16,top:"74%",height:"16%"}],
    xAxis:[{type:"category",data:h.d,axisLine:{lineStyle:{color:AX}},axisLabel:{color:TXT},boundaryGap:true},
           {type:"category",gridIndex:1,data:h.d,axisLine:{lineStyle:{color:AX}},axisLabel:{show:false}}],
    yAxis:[{scale:true,splitLine:{lineStyle:{color:GRID}},axisLabel:{color:TXT}},
           {gridIndex:1,splitLine:{show:false},axisLabel:{show:false}}],
    dataZoom:[{type:"inside",xAxisIndex:[0,1],start:55,end:100},{type:"slider",xAxisIndex:[0,1],bottom:4,height:14,start:55,end:100,borderColor:GRID,textStyle:{color:TXT}}],
    series:[
      {type:"candlestick",data:kd,itemStyle:{color:UP,color0:DOWN,borderColor:UP,borderColor0:DOWN}},
      {type:"bar",xAxisIndex:1,yAxisIndex:1,data:h.v,itemStyle:{color:"#2a3447"}}
    ]});
}
function drawLine(){
  const c=mk("c_line");if(!c)return;const hist=DATA.history||{},idx=DATA.indices||{};
  const syms=[...CNN(),...USN()].filter(s=>hist[s]&&hist[s].c.length>2);
  if(!syms.length)return;
  const L=Math.min(...syms.map(s=>hist[s].c.length));
  const refD=hist[syms[0]].d.slice(-L);
  const pal=["#ff4d57","#ff8aa0","#f5a623","#ffd17a","#3b82f6","#6fb0ff","#1fc78b","#7ee0bf"];
  const series=syms.map((s,i)=>{const arr=hist[s].c.slice(-L);const b=arr[0];
    return {name:idx[s]?idx[s].name:s,type:"line",showSymbol:false,smooth:true,lineStyle:{width:1.6,color:pal[i%pal.length]},itemStyle:{color:pal[i%pal.length]},data:arr.map(v=>+(v/b*100).toFixed(2))};});
  c.setOption({...baseGrid,tooltip:{trigger:"axis"},legend:{type:"scroll",textStyle:{color:TXT},top:0},
    grid:{left:44,right:14,top:34,bottom:24},
    xAxis:{type:"category",data:refD,axisLine:{lineStyle:{color:AX}},axisLabel:{color:TXT}},
    yAxis:{scale:true,splitLine:{lineStyle:{color:GRID}},axisLabel:{color:TXT}},series});
}
function drawTrack(){
  const c=mk("c_track");if(!c)return;const list=trackAvgList();if(!list.length)return;
  c.setOption({...baseGrid,tooltip:{trigger:"axis",axisPointer:{type:"shadow"},valueFormatter:v=>fmtp(v)},
    grid:{left:120,right:40,top:8,bottom:8},
    xAxis:{type:"value",axisLabel:{color:TXT,formatter:"{value}%"},splitLine:{lineStyle:{color:GRID}}},
    yAxis:{type:"category",data:list.map(x=>x.t),axisLabel:{color:TXT},axisLine:{lineStyle:{color:AX}}},
    series:[{type:"bar",data:list.map(x=>({value:+x.a.toFixed(2),itemStyle:{color:col(x.a),borderRadius:[0,3,3,0]}})),
      label:{show:true,position:"right",color:TXT,formatter:p=>fmtp(p.value)},barWidth:"58%"}]});
}
function drawMovers(){
  const c=mk("c_mov");if(!c)return;
  const rows=Object.values(DATA.tickers||{}).filter(x=>x.kind==="stock"&&x.pct!=null).sort((a,b)=>b.pct-a.pct);
  const top=rows.slice(0,15),bot=rows.slice(-15);
  // 从下到上:领跌(最差在底)→ 领涨(最强在顶)
  const sel=[...bot.slice().reverse(),...top.slice().reverse()];
  c.setOption({...baseGrid,tooltip:{trigger:"axis",axisPointer:{type:"shadow"},valueFormatter:v=>fmtp(v)},
    grid:{left:78,right:46,top:8,bottom:8},
    xAxis:{type:"value",axisLabel:{color:TXT,formatter:"{value}%"},splitLine:{lineStyle:{color:GRID}}},
    yAxis:{type:"category",data:sel.map(x=>x.name),axisLabel:{color:TXT,fontSize:10},axisLine:{lineStyle:{color:AX}}},
    series:[{type:"bar",data:sel.map(x=>({value:+x.pct.toFixed(2),itemStyle:{color:col(x.pct)}})),
      label:{show:true,position:"right",color:TXT,fontSize:10,formatter:p=>fmtp(p.value)},barWidth:"62%"}]});
}
function drawPie(cn,us){
  const c=mk("c_pie");if(!c)return;
  const up=cn.up+us.up,dn=cn.dn+us.dn,fl=cn.fl+us.fl;
  c.setOption({...baseGrid,tooltip:{trigger:"item"},legend:{bottom:0,textStyle:{color:TXT}},
    series:[{type:"pie",radius:["46%","72%"],center:["50%","46%"],avoidLabelOverlap:true,
      itemStyle:{borderColor:"#0e131d",borderWidth:2},
      label:{color:TXT,formatter:"{b} {c}"},
      data:[{name:"上涨",value:up,itemStyle:{color:UP}},{name:"下跌",value:dn,itemStyle:{color:DOWN}},{name:"平盘",value:fl,itemStyle:{color:FLAT}}]}]});
}
function drawGauge(cn,us){
  const c=mk("c_gauge");if(!c)return;
  const n=cn.n+us.n,up=cn.up+us.up;const adv=n?+(up/n*100).toFixed(1):0;
  const cc=adv>=60?UP:(adv<=40?DOWN:"#f5a623");
  c.setOption({...baseGrid,series:[{type:"gauge",min:0,max:100,radius:"92%",center:["50%","58%"],
    progress:{show:true,width:14,itemStyle:{color:cc}},axisLine:{lineStyle:{width:14,color:[[1,"#1f2838"]]}},
    pointer:{itemStyle:{color:cc}},axisTick:{show:false},splitLine:{distance:-14,length:10,lineStyle:{color:"#2a3447"}},
    axisLabel:{color:TXT,distance:-2,fontSize:9},
    anchor:{show:false},title:{show:true,offsetCenter:[0,"28%"],color:TXT,fontSize:11},
    detail:{valueAnimation:true,formatter:"{value}%",color:cc,fontSize:26,offsetCenter:[0,"-4%"]},
    data:[{value:adv,name:"上涨占比"}]}]});
}
function drawTree(){
  const c=mk("c_tree");if(!c)return;
  const uni=DATA.universe||[],tk=DATA.tickers||{};
  const byT={},seen=[];
  uni.forEach(r=>{if(r.kind!=="stock")return;if(!seen.includes(r.track))seen.push(r.track);
    const q=tk[r.yf];if(!q||q.pct==null)return;
    (byT[r.track]=byT[r.track]||{}); byT[r.track][r.code]={name:r.name,pct:q.pct};});
  function tcol(p){const a=Math.min(Math.abs(p)/4,1);const base=p>0?[255,77,87]:(p<0?[31,199,139]:[107,115,132]);
    const f=0.35+0.55*a;return "rgba("+base.map(x=>Math.round(x*f+22*(1-f))).join(",")+",1)";}
  const data=seen.filter(t=>byT[t]).map(t=>({name:t,
    children:Object.values(byT[t]).map(o=>({name:o.name,value:Math.abs(o.pct)+0.4,
      label:{formatter:o.name+"\n"+fmtp(o.pct)},itemStyle:{color:tcol(o.pct)}}))}));
  c.setOption({...baseGrid,tooltip:{formatter:p=>p.name},
    series:[{type:"treemap",roam:false,nodeClick:false,breadcrumb:{show:false},
      upperLabel:{show:true,height:20,color:"#cfd6e4",fontSize:11},
      itemStyle:{borderColor:"#0a0e16",borderWidth:1,gapWidth:2},
      levels:[{itemStyle:{borderColor:"#0a0e16",borderWidth:3,gapWidth:3}},{itemStyle:{gapWidth:1},upperLabel:{show:true}}],
      label:{color:"#fff",fontSize:10,lineHeight:13},data}]});
}

/* ============ 排名 ============ */
let rs={market:"ALL",kind:"ALL"};
function renderRank(){
  const el=document.getElementById("rank");
  let h="<div class='controls'><span style='font-size:11px;color:var(--dim)'>市场</span>";
  ["ALL","CN","US"].forEach(m=>h+="<button data-mk='"+m+"' class='"+(rs.market===m?"on":"")+"'>"+({ALL:"全部",CN:"A股",US:"美股"}[m])+"</button>");
  h+="<span style='font-size:11px;color:var(--dim);margin-left:6px'>类型</span>";
  [["ALL","全部"],["stock","个股"],["etf","ETF"]].forEach(([k,l])=>h+="<button data-kd='"+k+"' class='"+(rs.kind===k?"on":"")+"'>"+l+"</button>");
  h+="<input id='q' placeholder='搜索名称/代码' style='flex:1;min-width:130px'></div><div id='rt'></div>";
  el.innerHTML=h;
  el.querySelectorAll("[data-mk]").forEach(b=>b.onclick=()=>{rs.market=b.dataset.mk;renderRank();});
  el.querySelectorAll("[data-kd]").forEach(b=>b.onclick=()=>{rs.kind=b.dataset.kd;renderRank();});
  el.querySelector("#q").oninput=drawRT;drawRT();
}
function drawRT(){
  const q=(document.getElementById("q").value||"").toLowerCase();
  let rows=Object.values(DATA.tickers||{}).filter(x=>x.pct!=null);
  if(rs.market!=="ALL")rows=rows.filter(x=>x.market===rs.market);
  if(rs.kind!=="ALL")rows=rows.filter(x=>x.kind===rs.kind);
  if(q)rows=rows.filter(x=>(x.name+x.code).toLowerCase().includes(q));
  rows.sort((a,b)=>b.pct-a.pct);
  let h="<table><thead><tr><th>#</th><th>名称</th><th>代码</th><th>市场</th><th style='text-align:right'>价</th><th style='text-align:right'>涨跌幅</th></tr></thead><tbody>";
  rows.forEach((x,i)=>h+="<tr><td class='rk'>"+(i+1)+"</td><td>"+x.name+(x.kind==="etf"?"<span class='k-etf'>ETF</span>":"")+"</td><td class='num'>"+x.code+"</td><td><span class='mtag m-"+x.market+"'>"+(x.market==="CN"?"A股":"美股")+"</span></td><td class='num'>"+x.price.toLocaleString()+"</td><td class='pct' style='color:"+col(x.pct)+"'>"+fmtp(x.pct)+"</td></tr>");
  h+="</tbody></table>";
  document.getElementById("rt").innerHTML=rows.length?h:"<div class='empty'>无匹配数据</div>";
}

/* ============ 赛道热力 ============ */
function tile(name,q){
  if(!q||q.pct==null)return "<div class='tile flat'><span class='tn'>"+name+"</span><span class='tp'>—</span></div>";
  const p=q.pct,d=dir(p),inten=Math.min(Math.abs(p)/4,1),a=(0.14+0.6*inten).toFixed(2);
  const rgb=p>0?"255,77,87":(p<0?"31,199,139":"107,115,132");
  const glow=inten>0.45?"box-shadow:0 0 12px rgba("+rgb+","+(0.3*inten).toFixed(2)+");":"";
  return "<div class='tile' style='background:rgba("+rgb+","+a+");"+glow+"'><span class='tn'>"+name+"</span><span class='tp' style='color:#fff'>"+fmtp(p)+"</span></div>";
}
function renderTracks(){
  const uni=DATA.universe||[],tk=DATA.tickers||{},byT={},seen=[];
  uni.forEach(r=>{(byT[r.track]=byT[r.track]||[]).push(r);if(!seen.includes(r.track))seen.push(r.track);});
  let h="";
  seen.forEach(tname=>{const recs=byT[tname],layer=recs[0].layer,stars=recs[0].stars;
    const ps=recs.filter(r=>r.kind==="stock"&&tk[r.yf]&&tk[r.yf].pct!=null).map(r=>tk[r.yf].pct);
    const avg=ps.length?ps.reduce((a,b)=>a+b,0)/ps.length:null,up=ps.filter(p=>p>0).length,dn=ps.filter(p=>p<0).length;
    const ac=avg==null?"var(--mut)":col(avg);
    h+="<div class='track'><div class='thead'><span class='tn'>"+tname+"</span><span class='ly'>"+layer+"</span><span class='stars'>"+stars5(stars)+"</span><span class='avgbadge' style='color:"+ac+";border-color:"+ac+"33'>赛道均值 "+(avg==null?"—":fmtp(avg))+"</span></div><div class='breadth'>"+up+" ↑ / "+dn+" ↓</div>";
    ["US","CN"].forEach(mkt=>{const list=recs.filter(r=>r.market===mkt);if(!list.length)return;
      h+="<div class='subl'>"+(mkt==="US"?"美股":"A股")+"</div><div class='heat'>"+list.map(r=>tile(r.name,tk[r.yf])).join("")+"</div>";});
    h+="</div>";});
  document.getElementById("tracks").innerHTML=uni.length?h:"<div class='empty'>尚无赛道数据</div>";
}
function stars5(n){let s="";for(let i=0;i<5;i++)s+=i<n?"★":"<span class='o'>★</span>";return s;}

/* ============ 简报(文章式) ============ */
function renderBrief(){
  const b=DATA.briefs||{};
  const ord=[["cn_summary"],["cn_preview"],["us_summary"],["us_preview"]];
  let h="";
  ord.forEach(([k])=>{const x=b[k];if(!x)return;
    h+="<div class='brief'><h3>"+x.title+"</h3><div class='st'>"+x.stamp+" · "+(x.headline||"")+"</div>";
    if(x.intro)h+="<div class='intro'>"+x.intro+"</div>";
    if(x.sections)x.sections.forEach(s=>{h+="<h4>"+s.h+"</h4><ul>"+(s.items||[]).map(it=>"<li>"+it+"</li>").join("")+"</ul>";});
    else if(x.bullets)h+="<ul>"+x.bullets.map(it=>"<li>"+it+"</li>").join("")+"</ul>";
    h+="</div>";});
  document.getElementById("brief").innerHTML=h||"<div class='empty'>简报将在定时任务运行后生成。</div>";
}

document.getElementById("tabs").addEventListener("click",e=>{
  const b=e.target.closest(".tab");if(!b)return;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  document.querySelectorAll(".sec").forEach(s=>s.classList.remove("on"));
  b.classList.add("on");document.getElementById(b.dataset.s).classList.add("on");
  setTimeout(()=>charts.forEach(c=>{try{c.resize();}catch(e){}}),60);
});
window.addEventListener("resize",()=>charts.forEach(c=>{try{c.resize();}catch(e){}}));
load();
</script>
