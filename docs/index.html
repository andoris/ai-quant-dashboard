function genHist(seed){
  let x=0;for(let i=0;i<seed.length;i++)x=(x*31+seed.charCodeAt(i))>>>0;x=x||7;
  function rnd(){x=(x*1103515245+12345)>>>0;return (x%100000)/100000;}
  const n=130,d=[],o=[],h=[],l=[],c=[],v=[];let px=20+rnd()*380;
  const st=new Date();st.setDate(st.getDate()-Math.round(n*1.4));
  for(let i=0;i<n;i++){const op=px,cl=op*(0.965+rnd()*0.07);
    const dt=new Date(st);dt.setDate(st.getDate()+Math.round(i*1.4));
    d.push((""+(dt.getMonth()+1)).padStart(2,"0")+"-"+(""+dt.getDate()).padStart(2,"0"));

  return {d,o,h,l,c,v};
}

  try{const r=await fetch("./data.json?t="+Date.now());if(r.ok){DATA=await r.json();ok=true;}}catch(e){}

  else{document.getElementById("meta").textContent="尚无数据 —— 等定时任务或手动 Run workflow 跑完即出现。";return;}

}

let UNI={};
function buildUniIndex(){
  UNI={};(DATA.universe||[]).forEach(r=>{
    if(!UNI[r.yf])UNI[r.yf]={name:r.name,en:r.en,layer:r.layer,desc:r.desc,track_en:r.track_en,market:r.market,kind:r.kind,tracks:[]};
    if(!UNI[r.yf].tracks.includes(r.track))UNI[r.yf].tracks.push(r.track);
  });
}

function router(){
  const h=location.hash||"";

  return {up:a.filter(x=>x.pct>0).length,dn:a.filter(x=>x.pct<0).length,fl:a.filter(x=>x.pct===0).length,n:a.length};}
function trackAvgList(){const uni=DATA.universe||[],tk=DATA.tickers||{},m={},seen=[];
  uni.forEach(r=>{if(r.kind!=="stock")return;if(!seen.includes(r.track))seen.push(r.track);const q=tk[r.yf];if(q&&q.pct!=null)(m[r.track]=m[r.track]||[]).push(q.pct);});
  return seen.filter(t=>m[t]).map(t=>({t,a:m[t].reduce((x,y)=>x+y,0)/m[t].length})).sort((x,y)=>x.a-y.a);}

function tcol(p){const a=Math.min(Math.abs(p)/4,1),b=(p>0?UP_RGB:(p<0?DOWN_RGB:"107,115,132")).split(",").map(Number),f=0.32+0.6*a;
  return "rgb("+b.map(x=>Math.round(x*f+22*(1-f))).join(",")+")";}
function sectorBullets(track,mkt){
  const uni=DATA.universe||[],tk=DATA.tickers||{},ps=[],seen=new Set();
  uni.forEach(r=>{if(r.kind!=="stock"||r.track!==track)return;if(mkt!=="ALL"&&r.market!==mkt)return;if(seen.has(r.code))return;const q=tk[r.yf];if(!q||q.pct==null)return;seen.add(r.code);ps.push({name:r.name,pct:q.pct});});
  if(!ps.length)return ["该板块暂无数据。"];
  ps.sort((a,b)=>b.pct-a.pct);
  const up=ps.filter(x=>x.pct>0).length,dn=ps.filter(x=>x.pct<0).length,avg=ps.reduce((a,b)=>a+b.pct,0)/ps.length,adv=Math.round(up/ps.length*100);
  return ["赛道均值 "+fmtp(+avg.toFixed(2))+","+up+" 涨 / "+dn+" 跌(共 "+ps.length+" 只),上涨占比 "+adv+"%。",
    "领涨:"+ps.slice(0,3).map(x=>x.name+" "+fmtp(x.pct)).join("、")+"。",
    "领跌:"+ps.slice(-3).reverse().map(x=>x.name+" "+fmtp(x.pct)).join("、")+"。",
    (adv>=60?"板块整体偏强,资金活跃。":adv<=40?"板块整体偏弱,注意回避。":"板块涨跌分化,以个股为主。")];
}

function drawTree(mkt){
  mkt=mkt||"ALL";const el=document.getElementById("c_tree");if(!el||!HASE())return;
  const c=echarts.getInstanceByDom(el)||mk("c_tree");if(!c)return;
  const uni=DATA.universe||[],tk=DATA.tickers||{},byT={},seen=[];
  uni.forEach(r=>{if(r.kind!=="stock")return;if(mkt!=="ALL"&&r.market!==mkt)return;if(!seen.includes(r.track))seen.push(r.track);const q=tk[r.yf];if(!q||q.pct==null)return;
    (byT[r.track]=byT[r.track]||{});byT[r.track][r.yf]={name:r.name,code:r.code,en:r.en,pct:q.pct,yf:r.yf};});
  function leaf(o){return {name:o.name,value:Math.abs(o.pct)+0.4,sym:o.yf,label:{formatter:o.name+"  "+o.code+"\n"+fmtp(o.pct)},itemStyle:{color:tcol(o.pct)}};}
  let data;
  if(heatSector&&byT[heatSector]){data=Object.values(byT[heatSector]).map(leaf);}
  else{data=seen.filter(t=>byT[t]).map(t=>({name:t,children:Object.values(byT[t]).map(leaf)}));}
  c.setOption({...base,tooltip:{formatter:p=>p.name+(p.data&&p.data.sym?"  "+(fmtp((tk[p.data.sym]||{}).pct)):"")},
    series:[{type:"treemap",roam:false,nodeClick:false,breadcrumb:{show:false},
      left:0,right:0,top:0,bottom:0,width:"100%",height:"100%",
      upperLabel:{show:true,height:34,color:"#ffffff",fontSize:20,fontWeight:600},
      itemStyle:{borderColor:"#0a0e16",borderWidth:1,gapWidth:2},
      levels:[{itemStyle:{borderColor:"#0a0e16",borderWidth:3,gapWidth:4},upperLabel:{show:true,height:36,fontSize:22,color:"#ffffff",fontWeight:600}},{itemStyle:{gapWidth:1}}],
      emphasis:{itemStyle:{borderColor:"#fff",borderWidth:2}},
      label:{color:"#fff",fontSize:11,lineHeight:14},data}]},true);

/* ============ 技术指标 ============ */
function MA(a,n){return a.map((_,i)=>i<n-1?null:+(a.slice(i-n+1,i+1).reduce((x,y)=>x+y,0)/n).toFixed(2));}
function EMA(a,n){const k=2/(n+1),e=[];a.forEach((v,i)=>e.push(i===0?v:+(v*k+e[i-1]*(1-k)).toFixed(4)));return e;}
function MACD(c){const e12=EMA(c,12),e26=EMA(c,26),dif=c.map((_,i)=>+(e12[i]-e26[i]).toFixed(3)),dea=EMA(dif,9);
  return {dif,dea,macd:dif.map((_,i)=>+((dif[i]-dea[i])*2).toFixed(3))};}
function RSI(c,n){const r=[null];let g=0,l=0;
  for(let i=1;i<c.length;i++){const ch=c[i]-c[i-1],gg=Math.max(ch,0),ll=Math.max(-ch,0);
    if(i<n){g+=gg;l+=ll;r.push(null);}else if(i===n){g=(g+gg)/n;l=(l+ll)/n;r.push(+(100-100/(1+g/(l||1e-9))).toFixed(2));}
    else{g=(g*(n-1)+gg)/n;l=(l*(n-1)+ll)/n;r.push(+(100-100/(1+g/(l||1e-9))).toFixed(2));}}return r;}
function BOLL(c,n=20,k=2){const ma=MA(c,n),up=[],dn=[];c.forEach((_,i)=>{if(i<n-1){up.push(null);dn.push(null);return;}
  const seg=c.slice(i-n+1,i+1),m=ma[i],sd=Math.sqrt(seg.reduce((s,v)=>s+(v-m)*(v-m),0)/n);up.push(+(m+k*sd).toFixed(2));dn.push(+(m-k*sd).toFixed(2));});return {mid:ma,up,dn};}
function KDJ(hh,ll,c,n=9){let K=50,D=50;const Ka=[],Da=[],Ja=[];c.forEach((_,i)=>{if(i<n-1){Ka.push(null);Da.push(null);Ja.push(null);return;}
  const h=Math.max(...hh.slice(i-n+1,i+1)),l=Math.min(...ll.slice(i-n+1,i+1)),rsv=h===l?50:(c[i]-l)/(h-l)*100;
  K=2/3*K+1/3*rsv;D=2/3*D+1/3*K;Ka.push(+K.toFixed(2));Da.push(+D.toFixed(2));Ja.push(+(3*K-2*D).toFixed(2));});return {K:Ka,D:Da,J:Ja};}

function computeSignals(h){
  const c=h.c,ma=MA(c,20),m=MACD(c),rsi=RSI(c,14),b=BOLL(c),i=c.length-1;
  const chips=[];let good=0,bad=0;
  function add(label,val,cls){chips.push("<span class='indchip'>"+label+" <b class='"+cls+"'>"+val+"</b></span>");if(cls==="good")good++;if(cls==="bad")bad++;}
  if(rsi[i]!=null){const r=rsi[i];add("RSI",r.toFixed(0)+(r>70?" 超买":r<30?" 超卖":""),r>70?"bad":r<30?"good":"neu");}
  if(m.dif[i]!=null){const bull=m.dif[i]>m.dea[i];add("MACD",bull?"多头":"空头",bull?"good":"bad");}
  if(ma[i]!=null)add("MA20",c[i]>=ma[i]?"价在上方":"价在下方",c[i]>=ma[i]?"good":"bad");
  if(b.up[i]!=null){const pos=c[i]>b.up[i]?"触上轨":c[i]<b.dn[i]?"触下轨":"通道内";add("BOLL",pos,pos==="触上轨"?"bad":pos==="触下轨"?"good":"neu");}
  return {chips:chips.join(""),good,bad,ma20:ma[i],rsi:rsi[i]};
}

function drawDetailMain(h){const c=dgrid("d_main");if(!c)return;const close=h.c;
  const kd=close.map((_,i)=>[h.o[i],h.c[i],h.l[i],h.h[i]]);

/* ECharts 多源加载:国内可达 CDN 优先,jsdelivr/cdnjs 兜底,每源 4s 超时跳下一个 */
function loadEcharts(cb){
  if(typeof echarts!=="undefined"){cb();return;}
  var urls=["https://cdn.staticfile.org/echarts/5.5.0/echarts.min.js",
            "https://lib.baomitu.com/echarts/5.5.0/echarts.min.js",
            "https://cdn.bootcdn.net/ajax/libs/echarts/5.5.0/echarts.min.js",
            "https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js",
            "https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"];
  var i=0,done=false;
  function finish(){if(done)return;done=true;cb();}
  function next(){
    if(done)return;
    if(i>=urls.length){finish();return;}
    var s=document.createElement("script");s.src=urls[i++];
    var t=setTimeout(function(){s.onload=s.onerror=null;next();},4000);
    s.onload=function(){clearTimeout(t);if(typeof echarts!=="undefined")finish();else next();};
    s.onerror=function(){clearTimeout(t);next();};
    document.head.appendChild(s);
  }
  next();
}
