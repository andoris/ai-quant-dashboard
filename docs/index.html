<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 算力链 · 行情终端 AI Compute Chain Terminal</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  :root{--bg:#0a0e16;--bg2:#0e131d;--panel:#121826;--panel2:#161d2c;--bd:#1f2838;--bd2:#2a3447;
    --tx:#e6ebf5;--mut:#8a94a8;--dim:#5e6678;--up:#ff4d57;--down:#1fc78b;--flat:#6b7384;--accent:#3b82f6;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;}
  *{box-sizing:border-box;}
  body{margin:0;background:radial-gradient(1200px 600px at 70% -10%,#10192b 0%,var(--bg) 60%);color:var(--tx);
    font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased;}
  header{padding:15px 20px 8px;}
  h1{font-size:17px;margin:0;font-weight:600;display:flex;align-items:center;gap:9px;}
  h1 small{font-size:11px;color:var(--dim);font-weight:400;}
  h1::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--down);box-shadow:0 0 10px var(--down);animation:pulse 2.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .meta{font-size:11px;color:var(--mut);margin-top:4px;font-family:var(--mono);}
  .tabs{display:flex;gap:4px;padding:10px 16px 0;flex-wrap:wrap;border-bottom:1px solid var(--bd);}
  .tab{font-size:13px;padding:7px 15px;border:none;background:none;cursor:pointer;color:var(--mut);border-bottom:2px solid transparent;border-radius:6px 6px 0 0;line-height:1.25;text-align:center;}
  .tab small{display:block;font-size:9.5px;color:var(--dim);font-weight:400;}
  .tab:hover{color:var(--tx);background:var(--panel);}
  .tab.on{color:#fff;border-bottom-color:var(--accent);font-weight:600;}
  main{padding:16px;max-width:1240px;margin:0 auto;}
  .sec{display:none;} .sec.on{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .secTitle{font-size:17px;font-weight:600;margin:14px 0 12px;display:flex;align-items:baseline;gap:9px;}
  .secTitle span{font-size:11px;color:var(--dim);font-weight:400;letter-spacing:.5px;}
  .zh2{display:flex;flex-direction:column;line-height:1.16;}
  .zh2 .en{font-size:10px;color:var(--dim);font-weight:400;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(176px,1fr));gap:11px;margin-bottom:18px;}
  .icard{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--bd);border-radius:12px;padding:13px 15px;position:relative;overflow:hidden;text-align:left;cursor:pointer;color:var(--tx);font-family:inherit;transition:transform .1s,border-color .1s;}
  .icard:hover{transform:translateY(-2px);border-color:var(--bd2);}
  .icard::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;}
  .icard.u::after{background:var(--up);box-shadow:0 0 12px var(--up);}
  .icard.d::after{background:var(--down);box-shadow:0 0 12px var(--down);}
  .icard .nm{font-size:12px;color:var(--mut);} .icard .nm .en{font-size:10px;color:var(--dim);}
  .icard .pt{font-size:21px;font-weight:600;margin-top:4px;font-family:var(--mono);}
  .icard .ch{font-size:13px;font-weight:700;margin-top:3px;font-family:var(--mono);}
  .bre b.u{color:var(--up);} .bre b.d{color:var(--down);}
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
  .panel{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--bd);border-radius:14px;padding:13px 15px;}
  .panel.full{grid-column:1/-1;}
  .panel .pt{font-size:13.5px;font-weight:600;margin:0 0 4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .panel .ps{font-size:11px;color:var(--dim);font-weight:400;}
  .chart{width:100%;}
  select{font-size:12px;padding:4px 8px;border:1px solid var(--bd2);border-radius:7px;background:var(--panel);color:var(--tx);font-family:inherit;}
  @media(max-width:780px){.charts{grid-template-columns:1fr;}}
  .controls{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
  .controls button,input{font-size:12.5px;padding:6px 11px;border:1px solid var(--bd2);border-radius:8px;background:var(--panel);color:var(--tx);cursor:pointer;font-family:inherit;}
  .controls button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  input::placeholder{color:var(--dim);}
  table{width:100%;border-collapse:collapse;font-size:12.5px;background:var(--panel);border:1px solid var(--bd);border-radius:10px;overflow:hidden;}
  th,td{padding:8px 10px;border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap;}
  th{background:var(--bg2);color:var(--mut);font-weight:600;font-size:11px;}
  tr:hover td{background:var(--panel2);} tr.clk{cursor:pointer;}
  td.pct{font-weight:700;text-align:right;font-family:var(--mono);} td.num{text-align:right;color:var(--mut);font-family:var(--mono);}
  .rk{color:var(--dim);font-family:var(--mono);}
  .mtag{font-size:10px;padding:1px 6px;border-radius:5px;font-weight:600;}
  .m-US{background:#10243f;color:#6fb0ff;} .m-CN{background:#3a1822;color:#ff8aa0;}
  .k-etf{font-size:9.5px;color:#9bd;background:#16243a;padding:1px 5px;border-radius:4px;margin-left:5px;}
  .track{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--bd);border-radius:14px;padding:14px 16px;margin-bottom:14px;}
  .thead{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px;}
  .thead .tn{font-size:15px;font-weight:600;} .thead .tn .en{font-size:10px;color:var(--dim);font-weight:400;display:block;}
  .thead .ly{font-size:11px;color:var(--dim);}
  .stars{color:#f5a623;font-size:12px;} .stars .o{color:#39404f;}
  .avgbadge{margin-left:auto;font-family:var(--mono);font-size:12.5px;font-weight:700;padding:4px 11px;border-radius:8px;border:1px solid var(--bd2);}
  .breadth{font-size:11px;color:var(--mut);font-family:var(--mono);margin-bottom:8px;}
  .subl{font-size:10.5px;letter-spacing:1px;color:var(--dim);margin:8px 0 6px;font-weight:600;}
  .heat{display:grid;grid-template-columns:repeat(auto-fill,minmax(116px,1fr));gap:6px;}
  .tile{border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:8px 9px;display:flex;flex-direction:column;gap:3px;min-height:52px;justify-content:center;cursor:pointer;transition:transform .1s,box-shadow .12s;text-align:left;color:#fff;font-family:inherit;}
  .tile:hover{transform:translateY(-3px) scale(1.03);border-color:rgba(255,255,255,.3);}
  .tile .tn{font-size:12px;font-weight:600;line-height:1.15;} .tile .tn .en{font-size:9px;opacity:.8;font-weight:400;}
  .tile .tp{font-size:12.5px;font-weight:700;font-family:var(--mono);}
  .tile.flat{background:var(--panel);} .tile.flat .tn{color:var(--mut);}
  .brief{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--bd);border-radius:14px;padding:18px 20px;margin-bottom:14px;}
  .brief h3{margin:0 0 3px;font-size:16px;} .brief .st{font-size:11px;color:var(--mut);margin-bottom:12px;font-family:var(--mono);}
  .brief .intro{font-size:13.5px;line-height:1.75;color:#cfd6e4;margin:0 0 14px;padding:12px 14px;background:rgba(59,130,246,.06);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;}
  .brief h4{font-size:13px;margin:14px 0 6px;color:#fff;display:flex;align-items:center;gap:7px;} .brief h4::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);}
  .brief ul{margin:0;padding-left:0;list-style:none;} .brief li{margin:6px 0;font-size:13px;line-height:1.6;padding-left:16px;position:relative;color:#dde3ee;} .brief li::before{content:"▸";position:absolute;left:0;color:var(--accent);}
  .empty{color:var(--mut);font-size:13px;padding:30px;text-align:center;}
  .foot{color:var(--dim);font-size:11px;margin-top:24px;line-height:1.6;font-family:var(--mono);}
  /* 详情页 */
  .backbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .backbtn{font-size:12.5px;padding:6px 13px;border:1px solid var(--bd2);border-radius:8px;background:var(--panel);color:var(--tx);cursor:pointer;font-family:inherit;}
  .backbtn:hover{border-color:var(--accent);color:#fff;}
  .dhead{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
  .dhead .dn{font-size:22px;font-weight:600;} .dhead .den{font-size:12px;color:var(--mut);}
  .dhead .dp{font-size:24px;font-weight:700;font-family:var(--mono);} .dhead .dc{font-size:15px;font-weight:700;font-family:var(--mono);}
  .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:9px;margin-bottom:16px;}
  .stat{background:var(--panel);border:1px solid var(--bd);border-radius:10px;padding:9px 12px;}
  .stat .l{font-size:11px;color:var(--mut);} .stat .v{font-size:16px;font-weight:600;font-family:var(--mono);margin-top:3px;}
  .inds{display:flex;flex-wrap:wrap;gap:7px;}
  .indchip{font-size:12px;padding:5px 11px;border-radius:8px;border:1px solid var(--bd2);background:var(--panel);}
  .indchip b{font-weight:700;} .good{color:var(--up);} .bad{color:var(--down);} .neu{color:var(--mut);}
  .profile{font-size:13px;line-height:1.7;color:#cfd6e4;}
  .profile .row{display:flex;gap:8px;margin:4px 0;} .profile .row .k{color:var(--mut);min-width:64px;}
  .disc{font-size:11px;color:var(--dim);margin-top:10px;line-height:1.6;}
</style>
</head>
<body>
<header>
  <h1>AI 算力链 · 行情终端 <small>AI Compute Chain · Market Terminal</small></h1>
  <div class="meta" id="meta">LOADING…</div>
</header>

<div id="viewMain">
<nav class="tabs" id="tabs">
  <button class="tab on" data-s="overview">大盘总览<small>Overview</small></button>
  <button class="tab" data-s="rank">涨跌幅排名<small>Movers</small></button>
  <button class="tab" data-s="tracks">全部赛道<small>Tracks</small></button>
  <button class="tab" data-s="brief">盘前/盘后简报<small>Briefing</small></button>
</nav>
<main>
  <section class="sec on" id="overview"></section>
  <section class="sec" id="rank"></section>
  <section class="sec" id="tracks"></section>
  <section class="sec" id="brief"></section>
  <div class="foot" id="foot"></div>
</main>
</div>

<div id="viewDetail" style="display:none"><main id="detailMain"></main></div>

<script>
const UP="#ff4d57",DOWN="#1fc78b",FLAT="#6b7384",ACC="#3b82f6",AX="#5e6678",GRID="#1f2838",TXT="#8a94a8";
const base={backgroundColor:"transparent",textStyle:{color:TXT,fontFamily:"inherit"}};
function dir(p){return p>0?"up":(p<0?"down":"flat");}
function col(p){return p>0?UP:(p<0?DOWN:FLAT);}
function fmtp(p){return (p==null)?"—":(p>0?"+":"")+p.toFixed(2)+"%";}
function bi(zh,en){return en?("<span class='zh2'>"+zh+"<span class='en'>"+en+"</span></span>"):zh;}
let DATA=null,charts=[],dcharts=[];

async function load(){
  try{const r=await fetch("./data.json?t="+Date.now());if(!r.ok)throw 0;DATA=await r.json();
    if(!DATA.meta||!DATA.meta.updated_at)throw 0;}
  catch(e){document.getElementById("meta").textContent="尚无数据 —— 等定时任务或手动 Run workflow 跑完即出现。";return;}
  const m=DATA.meta,f=s=>s?new Date(s).toLocaleString("zh-CN"):"—";
  document.getElementById("meta").innerHTML="A股 "+f(m.updated_cn)+" ｜ 美股 "+f(m.updated_us)+" ｜ 日级/延迟数据 Daily/Delayed · 红涨绿跌 · 非投资建议";
  document.getElementById("foot").textContent="标的(有数据) "+Object.keys(DATA.tickers||{}).length+" ｜ 数据源 yfinance ｜ 自动更新 GitHub Actions ｜ 仅供研究,非投资建议。";
  buildUniIndex();router();
}

/* universe 索引:yf -> {name,en,tracks[],layer,desc,track_en,market,kind} */
let UNI={};
function buildUniIndex(){
  UNI={};(DATA.universe||[]).forEach(r=>{
    if(!UNI[r.yf])UNI[r.yf]={name:r.name,en:r.en,layer:r.layer,desc:r.desc,track_en:r.track_en,market:r.market,kind:r.kind,tracks:[]};
    if(!UNI[r.yf].tracks.includes(r.track))UNI[r.yf].tracks.push(r.track);
  });
}

/* ============ 路由 ============ */
function go(sym){location.hash="#/d/"+encodeURIComponent(sym);}
function router(){
  const h=location.hash||"";
  if(h.startsWith("#/d/")){
    const sym=decodeURIComponent(h.slice(4));
    document.getElementById("viewMain").style.display="none";
    document.getElementById("viewDetail").style.display="block";
    renderDetail(sym);window.scrollTo(0,0);
  }else{
    document.getElementById("viewDetail").style.display="none";
    document.getElementById("viewMain").style.display="block";
    dcharts.forEach(c=>{try{c.dispose();}catch(e){}});dcharts=[];
    if(!document.getElementById("overview").dataset.done){renderAll();}
    setTimeout(()=>charts.forEach(c=>{try{c.resize();}catch(e){}}),50);
  }
}
window.addEventListener("hashchange",router);

function renderAll(){renderOverview();renderRank();renderTracks();renderBrief();document.getElementById("overview").dataset.done="1";}

/* ============ 工具 ============ */
function mk(id,arr){const el=document.getElementById(id);if(!el)return null;const c=echarts.init(el,null,{renderer:"canvas"});(arr||charts).push(c);return c;}
function CNN(){return ["000001.SS","399001.SZ","399006.SZ","000300.SS"];}
function USN(){return ["^GSPC","^IXIC","^SOX","^DJI"];}
function breadthOf(mkt){const a=Object.values(DATA.tickers||{}).filter(x=>x.market===mkt&&x.kind==="stock"&&x.pct!=null);
  return {up:a.filter(x=>x.pct>0).length,dn:a.filter(x=>x.pct<0).length,fl:a.filter(x=>x.pct===0).length,n:a.length};}
function trackAvgList(){const uni=DATA.universe||[],tk=DATA.tickers||{},m={},seen=[];
  uni.forEach(r=>{if(r.kind!=="stock")return;if(!seen.includes(r.track))seen.push(r.track);const q=tk[r.yf];if(q&&q.pct!=null)(m[r.track]=m[r.track]||[]).push(q.pct);});
  return seen.filter(t=>m[t]).map(t=>({t,a:m[t].reduce((x,y)=>x+y,0)/m[t].length})).sort((x,y)=>x.a-y.a);}

/* ============ 大盘总览 ============ */
function icard(sym,q){
  if(!q)return "<button class='icard' disabled><div class='nm'>—</div><div class='pt'>—</div></button>";
  const d=q.pct!=null?dir(q.pct):"flat";
  return "<button class='icard "+(d==='up'?'u':d==='down'?'d':'')+"' onclick=\"go('"+sym+"')\"><div class='nm'>"+bi(q.name,q.en)+"</div><div class='pt'>"+(q.price!=null?q.price.toLocaleString():"—")+"</div><div class='ch' style='color:"+col(q.pct)+"'>"+fmtp(q.pct)+"</div></button>";
}
function renderOverview(){
  const idx=DATA.indices||{};
  let h="<div class='secTitle'>全市场热力树图 <span>Market Heatmap · 点击任意个股查看 K 线与技术分析</span></div>";
  h+="<div class='panel full' style='margin-bottom:18px'><div class='pt'><span class='ps'>块大小=涨跌幅绝对值 · 颜色=涨跌 · 悬停高亮、点击进入详情</span></div><div id='c_tree' class='chart' style='height:480px'></div></div>";
  h+="<div class='secTitle'>A股大盘 <span>China A-Shares</span></div><div class='grid'>"+CNN().map(s=>icard(s,idx[s])).join("")+"</div>";
  h+="<div class='secTitle'>美股大盘 <span>US Markets</span></div><div class='grid'>"+USN().map(s=>icard(s,idx[s])).join("")+"</div>";
  const cn=breadthOf("CN"),us=breadthOf("US");
  h+="<div class='secTitle'>市场宽度 <span>Breadth</span></div><div class='grid bre'>"+
    "<div class='icard' style='cursor:default'><div class='nm'>A股 A-Shares</div><div class='ch'><b class='u'>"+cn.up+" ↑</b> / <b class='d'>"+cn.dn+" ↓</b> <span style='color:var(--dim)'>· 共 "+cn.n+"</span></div></div>"+
    "<div class='icard' style='cursor:default'><div class='nm'>美股 US</div><div class='ch'><b class='u'>"+us.up+" ↑</b> / <b class='d'>"+us.dn+" ↓</b> <span style='color:var(--dim)'>· 共 "+us.n+"</span></div></div></div>";
  const idxOpts=[...CNN(),...USN()].filter(s=>(DATA.history||{})[s]);
  const sel=idxOpts.includes("^SOX")?"^SOX":(idxOpts[0]||null);
  h+="<div class='secTitle'>图表分析 <span>Charts</span></div><div class='charts'>";
  h+="<div class='panel full'><div class='pt'>指数 K 线 + 量 Index K-Line <select id='ksel'>"+idxOpts.map(s=>"<option value='"+s+"' "+(s===sel?"selected":"")+">"+(idx[s]?idx[s].name:s)+"</option>").join("")+"</select><span class='ps'>近 60 日 · 点标题进该指数详情</span></div><div id='c_k' class='chart' style='height:320px'></div></div>";
  h+="<div class='panel full'><div class='pt'>指数走势(归一化=100)Index Trend <span class='ps'>相对强弱</span></div><div id='c_line' class='chart' style='height:280px'></div></div>";
  h+="<div class='panel'><div class='pt'>赛道平均涨跌幅 Track Avg</div><div id='c_track' class='chart' style='height:360px'></div></div>";
  h+="<div class='panel'><div class='pt'>领涨/领跌 TOP15 Top Movers</div><div id='c_mov' class='chart' style='height:360px'></div></div>";
  h+="<div class='panel'><div class='pt'>涨跌分布 Up/Down</div><div id='c_pie' class='chart' style='height:280px'></div></div>";
  h+="<div class='panel'><div class='pt'>市场情绪 Sentiment</div><div id='c_gauge' class='chart' style='height:280px'></div></div>";
  h+="</div>";
  document.getElementById("overview").innerHTML=h;
  charts.forEach(c=>{try{c.dispose();}catch(e){}});charts=[];
  drawTree();drawK(sel);drawLine();drawTrack();drawMovers();drawPie(cn,us);drawGauge(cn,us);
  const ks=document.getElementById("ksel");if(ks)ks.onchange=e=>drawK(e.target.value);
}
function drawTree(){
  const c=mk("c_tree");if(!c)return;const uni=DATA.universe||[],tk=DATA.tickers||{};
  const byT={},seen=[];
  uni.forEach(r=>{if(r.kind!=="stock")return;if(!seen.includes(r.track))seen.push(r.track);const q=tk[r.yf];if(!q||q.pct==null)return;
    (byT[r.track]=byT[r.track]||{});byT[r.track][r.yf]={name:r.name,en:r.en,pct:q.pct,yf:r.yf};});
  function tc(p){const a=Math.min(Math.abs(p)/4,1),b=p>0?[255,77,87]:(p<0?[31,199,139]:[107,115,132]),f=0.32+0.6*a;
    return "rgb("+b.map(x=>Math.round(x*f+22*(1-f))).join(",")+")";}
  const data=seen.filter(t=>byT[t]).map(t=>({name:t,children:Object.values(byT[t]).map(o=>({
    name:o.name,value:Math.abs(o.pct)+0.4,sym:o.yf,label:{formatter:o.name+"\n"+fmtp(o.pct)},itemStyle:{color:tc(o.pct)}}))}));
  c.setOption({...base,tooltip:{formatter:p=>p.name+(p.data&&p.data.sym?"  "+(fmtp((tk[p.data.sym]||{}).pct)):"")},
    series:[{type:"treemap",roam:false,nodeClick:false,breadcrumb:{show:false},
      upperLabel:{show:true,height:20,color:"#cfd6e4",fontSize:11},
      itemStyle:{borderColor:"#0a0e16",borderWidth:1,gapWidth:2},
      levels:[{itemStyle:{borderColor:"#0a0e16",borderWidth:3,gapWidth:3}},{itemStyle:{gapWidth:1},upperLabel:{show:true}}],
      emphasis:{itemStyle:{borderColor:"#fff",borderWidth:1}},
      label:{color:"#fff",fontSize:10,lineHeight:13},data}]});
  c.off("click");c.on("click",p=>{if(p.data&&p.data.sym)go(p.data.sym);});
}
function drawK(sym){const h=(DATA.history||{})[sym];const c=mk("c_k");if(!c||!h)return;
  const kd=h.c.map((_,i)=>[h.o[i],h.c[i],h.l[i],h.h[i]]);
  c.setOption({...base,tooltip:{trigger:"axis",axisPointer:{type:"cross"}},
    grid:[{left:48,right:14,top:12,height:"60%"},{left:48,right:14,top:"75%",height:"16%"}],
    xAxis:[{type:"category",data:h.d,axisLine:{lineStyle:{color:AX}},axisLabel:{color:TXT}},{type:"category",gridIndex:1,data:h.d,axisLabel:{show:false}}],
    yAxis:[{scale:true,splitLine:{lineStyle:{color:GRID}},axisLabel:{color:TXT}},{gridIndex:1,splitLine:{show:false},axisLabel:{show:false}}],
    dataZoom:[{type:"inside",xAxisIndex:[0,1],start:55,end:100},{type:"slider",xAxisIndex:[0,1],bottom:2,height:13,start:55,end:100,borderColor:GRID,textStyle:{color:TXT}}],
    series:[{type:"candlestick",data:kd,itemStyle:{color:UP,color0:DOWN,borderColor:UP,borderColor0:DOWN}},
      {type:"bar",xAxisIndex:1,yAxisIndex:1,data:h.v,itemStyle:{color:"#2a3447"}}]});
}

/* ============ 技术指标 ============ */
function MA(a,n){return a.map((_,i)=>i<n-1?null:+(a.slice(i-n+1,i+1).reduce((x,y)=>x+y,0)/n).toFixed(2));}
function EMA(a,n){const k=2/(n+1),e=[];a.forEach((v,i)=>e.push(i===0?v:+(v*k+e[i-1]*(1-k)).toFixed(4)));return e;}
function MACD(c){const e12=EMA(c,12),e26=EMA(c,26),dif=c.map((_,i)=>+(e12[i]-e26[i]).toFixed(3)),dea=EMA(dif,9);
  return {dif,dea,macd:dif.map((_,i)=>+((dif[i]-dea[i])*2).toFixed(3))};}
function RSI(c,n){const r=[null];let g=0,l=0;
  for(let i=1;i<c.length;i++){const ch=c[i]-c[i-1],gg=Math.max(ch,0),ll=Math.max(-ch,0);
    if(i<n){g+=gg;l+=ll;r.push(null);}else if(i===n){g=(g+gg)/n;l=(l+ll)/n;r.push(+(100-100/(1+g/(l||1e-9))).toFixed(2));}
    else{g=(g*(n-1)+gg)/n;l=(l*(n-1)+ll)/n;r.push(+(100-100/(1+g/(l||1e-9))).toFixed(2));}}return r;}
function BOLL(c,n=20,k=2){const ma=MA(c,n),up=[],dn=[];c.forEach((_,i)=>{if(i<n-1){up.push(null);dn.push(null);return;}
  const seg=c.slice(i-n+1,i+1),m=ma[i],sd=Math.sqrt(seg.reduce((s,v)=>s+(v-m)*(v-m),0)/n);up.push(+(m+k*sd).toFixed(2));dn.push(+(m-k*sd).toFixed(2));});return {mid:ma,up,dn};}
function KDJ(hh,ll,c,n=9){let K=50,D=50;const Ka=[],Da=[],Ja=[];c.forEach((_,i)=>{if(i<n-1){Ka.push(null);Da.push(null);Ja.push(null);return;}
  const h=Math.max(...hh.slice(i-n+1,i+1)),l=Math.min(...ll.slice(i-n+1,i+1)),rsv=h===l?50:(c[i]-l)/(h-l)*100;
  K=2/3*K+1/3*rsv;D=2/3*D+1/3*K;Ka.push(+K.toFixed(2));Da.push(+D.toFixed(2));Ja.push(+(3*K-2*D).toFixed(2));});return {K:Ka,D:Da,J:Ja};}

function computeSignals(h){
  const c=h.c,ma=MA(c,20),m=MACD(c),rsi=RSI(c,14),b=BOLL(c),i=c.length-1;
  const chips=[];let good=0,bad=0;
  function add(label,val,cls){chips.push("<span class='indchip'>"+label+" <b class='"+cls+"'>"+val+"</b></span>");if(cls==="good")good++;if(cls==="bad")bad++;}
  if(rsi[i]!=null){const r=rsi[i];add("RSI",r.toFixed(0)+(r>70?" 超买":r<30?" 超卖":""),r>70?"bad":r<30?"good":"neu");}
  if(m.dif[i]!=null){const bull=m.dif[i]>m.dea[i];add("MACD",bull?"多头":"空头",bull?"good":"bad");}
  if(ma[i]!=null)add("MA20",c[i]>=ma[i]?"价在上方":"价在下方",c[i]>=ma[i]?"good":"bad");
  if(b.up[i]!=null){const pos=c[i]>b.up[i]?"触上轨":c[i]<b.dn[i]?"触下轨":"通道内";add("BOLL",pos,pos==="触上轨"?"bad":pos==="触下轨"?"good":"neu");}
  return {chips:chips.join(""),good,bad,ma20:ma[i],rsi:rsi[i]};
}

    xAxis:{type:"category",data:h.d,axisLabel:{color:TXT},axisLine:{lineStyle:{color:AX}}},yAxis:{min:0,max:100,splitLine:{lineStyle:{color:GRID}},axisLabel:{color:TXT}},
    series:[{name:"RSI6",type:"line",data:RSI(h.c,6),showSymbol:false,lineStyle:{width:1,color:"#f5a623"}},
      {name:"RSI12",type:"line",data:RSI(h.c,12),showSymbol:false,lineStyle:{width:1,color:"#6fb0ff"}},
      {name:"RSI24",type:"line",data:RSI(h.c,24),showSymbol:false,lineStyle:{width:1,color:"#ff8aa0"}}]});
}
function drawKdj(h){const c=dgrid("d_kdj");if(!c)return;const k=KDJ(h.h,h.l,h.c);
  c.setOption({...base,tooltip:{trigger:"axis"},legend:{top:0,textStyle:{color:TXT}},grid:{left:40,right:14,top:24,bottom:22},
    xAxis:{type:"category",data:h.d,axisLabel:{color:TXT},axisLine:{lineStyle:{color:AX}}},yAxis:{scale:true,splitLine:{lineStyle:{color:GRID}},axisLabel:{color:TXT}},
    series:[{name:"K",type:"line",data:k.K,showSymbol:false,lineStyle:{width:1,color:"#f5a623"}},
      {name:"D",type:"line",data:k.D,showSymbol:false,lineStyle:{width:1,color:"#6fb0ff"}},
      {name:"J",type:"line",data:k.J,showSymbol:false,lineStyle:{width:1,color:"#ff8aa0"}}]});
}
function drawVol(h){const c=dgrid("d_vol");if(!c)return;const cols=h.c.map((_,i)=>h.c[i]>=h.o[i]?UP:DOWN);
  c.setOption({...base,tooltip:{trigger:"axis"},grid:{left:54,right:14,top:14,bottom:22},
    xAxis:{type:"category",data:h.d,axisLabel:{color:TXT},axisLine:{lineStyle:{color:AX}}},yAxis:{splitLine:{lineStyle:{color:GRID}},axisLabel:{color:TXT}},
    series:[{type:"bar",data:h.v.map((v,i)=>({value:v,itemStyle:{color:cols[i]}}))}]});
}

document.getElementById("tabs").addEventListener("click",e=>{const b=e.target.closest(".tab");if(!b)return;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  document.querySelectorAll(".sec").forEach(s=>s.classList.remove("on"));
  b.classList.add("on");document.getElementById(b.dataset.s).classList.add("on");
  setTimeout(()=>charts.forEach(c=>{try{c.resize();}catch(e){}}),60);});
window.addEventListener("resize",()=>{charts.concat(dcharts).forEach(c=>{try{c.resize();}catch(e){}});});
load();
</script>
